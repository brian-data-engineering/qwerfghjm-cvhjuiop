name: QW Scraper Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: |
          pip install requests pyyaml playwright playwright-stealth
          playwright install chromium

      - name: Run QW Script
        run: python qw_sync.py

      - name: Save and Push qw files
        run: |
          git config --global user.name "Lucra-Bot"
          git config --global user.email "bot@lucra.internal"
          
          # Add all unique qw files
          if ls qw_*.yml 1> /dev/null 2>&1; then
            git add qw_*.yml
            git commit -m "Update results: $(date)"
            git push
          else
            echo "Nothing to commit."
          fi
