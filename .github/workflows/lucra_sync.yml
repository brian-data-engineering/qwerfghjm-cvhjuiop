name: Lucra 30min Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests pyyaml selenium webdriver-manager

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "Lucra Bot"
          git config --global user.email "actions@github.com"
          git add results.yaml
          # '|| exit 0' ensures the workflow doesn't fail if no scores changed
          git commit -m "Auto-update scores: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
